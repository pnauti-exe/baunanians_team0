<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baunanians Team Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
       
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: #0d1117;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }
       
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .github-card { background: #161b22; border: 1px solid #30363d; }
       
        .glow-upload {
            box-shadow: 0 0 20px rgba(88,166,255,0.45), 0 0 40px rgba(139,92,246,0.35), 0 0 70px rgba(168,85,247,0.25);
            transition: box-shadow 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .glow-upload:hover {
            box-shadow: 0 0 30px rgba(88,166,255,0.65), 0 0 55px rgba(139,92,246,0.55), 0 0 90px rgba(168,85,247,0.4);
        }
        .glow-team {
            box-shadow: 0 0 15px rgba(88,166,255,0.35), 0 0 35px rgba(139,92,246,0.25), 0 0 60px rgba(168,85,247,0.15);
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .glow-team:hover {
            box-shadow: 0 0 25px rgba(88,166,255,0.6), 0 0 50px rgba(139,92,246,0.5), 0 0 85px rgba(168,85,247,0.35);
            transform: translateY(-4px) scale(1.01);
        }
    </style>
</head>
<body class="text-gray-200">
    <div class="max-w-6xl mx-auto px-6 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-10 rounded-3xl p-6 border border-[#30363d]">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-[#21262d] rounded-2xl flex items-center justify-center text-3xl">🐙</div>
                <div>
                    <h1 class="title-font text-4xl font-semibold tracking-tighter text-white">Baunanians Team Maker</h1>
                    <p class="text-[#8b949e] mt-1 text-sm">Python &amp; ML Workshop • Teams of 3 (one team of 4 only if needed)</p>
                </div>
            </div>
        </div>

        <!-- Upload -->
        <div id="upload-card" class="github-card glow-upload rounded-3xl p-16 text-center cursor-pointer hover:border-[#58a6ff]">
            <div class="mx-auto w-24 h-24 bg-[#21262d] rounded-3xl flex items-center justify-center mb-8">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-14 h-14 text-[#58a6ff]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903 5 5 0 0110.025 1.65L12 16V8" />
                </svg>
            </div>
            <h2 class="text-3xl font-semibold text-white mb-3">Upload Registration Sheet</h2>
            <p class="text-[#8b949e] max-w-md mx-auto mb-10">CSV or XLSX only</p>
            <input type="file" id="file-input" accept=".csv,.xlsx,.xls" class="hidden">
            <button onclick="document.getElementById('file-input').click()" 
                    class="px-10 py-5 bg-[#238636] hover:bg-[#2ea043] text-white font-medium rounded-2xl text-lg">
                Choose File
            </button>
        </div>

        <!-- Status -->
        <div id="status" class="hidden mt-12 text-center">
            <div class="inline-flex items-center gap-4 bg-[#161b22] px-10 py-4 rounded-2xl border border-[#30363d]">
                <div class="animate-spin w-6 h-6 border-4 border-[#58a6ff] border-t-transparent rounded-full"></div>
                <span id="status-text" class="font-medium text-[#c9d1d9]">Building teams...</span>
            </div>
        </div>

        <!-- Results -->
        <div id="results" class="hidden mt-12">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-semibold text-white">Teams Created</h2>
                    <p id="summary" class="text-[#8b949e]"></p>
                </div>
                <button onclick="downloadExcel()" 
                        class="flex items-center gap-3 bg-[#238636] hover:bg-[#2ea043] text-white px-8 py-4 rounded-2xl font-medium">
                    Download Excel
                </button>
            </div>
            <div id="teams-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <script>
        let allStudents = [];
        let finalTeams = [];

        function shuffle(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function computeEffectiveYear(student) {
            let year = parseInt(student.year);
            if (isNaN(year)) year = 1;
            const branch = String(student.branch || "").toUpperCase().trim();
            if (branch === "BCA") {
                if (year === 1) return 1;
                if (year === 2) return 3;
            }
            return year;
        }

        function processFile(file) {
            document.getElementById("upload-card").classList.add("hidden");
            document.getElementById("status").classList.remove("hidden");
            document.getElementById("status-text").textContent = "Reading file...";

            const reader = new FileReader();
            if (file.name.toLowerCase().endsWith(".csv")) {
                reader.onload = e => Papa.parse(e.target.result, {header:true, skipEmptyLines:true, complete:r => {allStudents = r.data.filter(row => row.name && row.name.trim()); createTeams();}});
                reader.readAsText(file);
            } else if (file.name.toLowerCase().match(/\.xlsx?$/)) {
                reader.onload = e => {
                    const wb = XLSX.read(new Uint8Array(e.target.result), {type:"array"});
                    allStudents = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    createTeams();
                };
                reader.readAsArrayBuffer(file);
            }
        }

        function createTeams() {
            document.getElementById("status-text").textContent = "Forming teams...";

            allStudents = allStudents.map(s => ({
                name: String(s.name || "").trim(),
                roll: String(s.roll || "").trim(),
                mobile: String(s.mobile || "").trim(),
                branch: String(s.branch || "").trim(),
                year: String(s.year || "").trim()
            })).filter(s => s.name);

            let groups = {"1":[], "2":[], "3":[]};
            allStudents.forEach(student => {
                const eff = computeEffectiveYear(student);
                if (eff >=1 && eff <=3) groups[eff].push(student);
            });

            groups["1"] = shuffle(groups["1"]);
            groups["2"] = shuffle(groups["2"]);
            groups["3"] = shuffle(groups["3"]);

            finalTeams = [];
            const min = Math.min(groups["1"].length, groups["2"].length, groups["3"].length);

            for (let i = 0; i < min; i++) {
                let team = [groups["1"].shift(), groups["2"].shift(), groups["3"].shift()];
                team.sort((a,b) => a.effYear - b.effYear);
                finalTeams.push({type:"balanced", members:team});
            }

            let leftovers = [...groups["1"], ...groups["2"], ...groups["3"]];
            leftovers = shuffle(leftovers);

            while (leftovers.length >= 3) {
                finalTeams.push({type:"leftover", members: leftovers.splice(0,3)});
            }

            if (leftovers.length === 1 && finalTeams.length > 0) {
                finalTeams[finalTeams.length-1].members.push(leftovers[0]);
                finalTeams[finalTeams.length-1].type = "balanced-4";
            } else if (leftovers.length > 0) {
                finalTeams.push({type:"leftover", members: leftovers});
            }

            renderResults();
        }

        function renderResults() {
            document.getElementById("status").classList.add("hidden");
            document.getElementById("results").classList.remove("hidden");

            const container = document.getElementById("teams-container");
            container.innerHTML = "";

            finalTeams.forEach((team, i) => {
                const div = document.createElement("div");
                div.className = "github-card glow-team rounded-3xl overflow-hidden";
                let html = `<div class="px-6 py-5 bg-[#21262d] flex justify-between"><span class="font-bold text-2xl">Team ${i+1}</span><span class="text-xs px-4 py-1 bg-[#30363d] rounded-full">${team.members.length} members</span></div>`;
                team.members.forEach(m => {
                    html += `<div class="px-6 py-5 border-t border-[#30363d] flex justify-between"><div><div class="font-semibold">${m.name}</div><div class="text-xs text-[#8b949e]">${m.roll} • ${m.branch} • Year ${m.year}</div></div><div class="font-mono text-[#39d353]">${m.mobile}</div></div>`;
                });
                div.innerHTML = html;
                container.appendChild(div);
            });

            // CLEAN SUMMARY - no "balanced / leftover" text
            document.getElementById("summary").innerHTML = `
                ${allStudents.length} students → ${finalTeams.length} teams
            `;
        }

        function downloadExcel() {
            let data = [["Team", "Name", "Roll", "Mobile", "Branch", "Year", "Size"]];
            finalTeams.forEach((t,i) => t.members.forEach(m => data.push([`Team ${i+1}`, m.name, m.roll, m.mobile, m.branch, m.year, t.members.length])));
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Teams");
            XLSX.writeFile(wb, "Baunanians_Teams.xlsx");
        }

        document.getElementById("file-input").addEventListener("change", e => {
            if (e.target.files[0]) processFile(e.target.files[0]);
        });
    </script>
</body>
</html>
